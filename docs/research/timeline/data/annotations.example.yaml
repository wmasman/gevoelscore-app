# annotations.example.yaml — schema documentation by example.
# Copy entries into annotations.yaml to add them to the timeline render.

# ----------------------------------------------------------------------
# markers — single-day events (point markers on the timeline)
# ----------------------------------------------------------------------
# Required: date (YYYY-MM-DD), label (short text), category
# Optional: note (longer free-text), color (hex; auto-picked by category if omitted)
# Categories used for default color:
#   medical          — diagnoses, test results, hospital visits
#   levensgebeurtenis — life events
#   interventie      — meds start/stop, therapy sessions, lifestyle changes
#   trigger          — known crash triggers (infections, big events)
#   marker           — neutral anchor points (start of tracking, season boundaries)

markers:
  - date: 2022-05-06
    label: "Long COVID diagnose"
    category: medical
    note: "Formele Long COVID diagnose vastgesteld."

  - date: 2022-09-03
    label: "Gevoelscore tracking start"
    category: marker
    note: "Eerste dag van dagelijkse gevoelscore-registratie."

# ----------------------------------------------------------------------
# spans — multi-day events (horizontal bands on the timeline)
# ----------------------------------------------------------------------
# Required: start (YYYY-MM-DD), end (YYYY-MM-DD), label, category
# Optional: note, color
# Notes:
#   - end must be >= start
#   - ongoing spans: omit end (the renderer treats null end as "to today")
#   - concurrent spans stack vertically in the band-strip

spans:
  - start: 2023-02-15
    end: 2023-04-01
    label: "Citalopram afbouw"
    category: interventie
    note: "20mg -> 0mg in ~6 weken."

  - start: 2024-07-15
    end: 2024-07-29
    label: "Vakantie Italie"
    category: levensgebeurtenis
    note: "Twee weken Italie."

  - start: 2025-04-01
    label: "Nieuwe baan"
    category: levensgebeurtenis
    note: "Ongoing — geen einddatum."
