name: verify

# Run the same gate the local pre-push hook runs, but on GitHub's
# infrastructure so a push from a fresh clone (or with hooks not
# installed) can't sneak past. Same `npm run verify` script — lint,
# typecheck, vitest.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel earlier runs on the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # `npm ci` honours package-lock.json and fails on drift — safer
      # than `npm install` for CI.
      - name: Install dependencies
        run: npm ci

      # The single source of truth — same command as the pre-push hook.
      # If this script changes locally it should still match here.
      - name: Verify (lint + typecheck + vitest)
        run: npm run verify
