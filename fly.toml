# Fly.io config for the gevoelscore-frontend Next.js app.
# Commitments come from ADR 0003.

app = "gevoelscore-frontend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"
  NEXT_PUBLIC_DIRECTUS_URL = "https://gevoelscore-backend.fly.dev"
  # Server-side calls go through the Fly proxy (public hostname), NOT
  # .internal: proxied traffic auto-starts the suspended backend machine;
  # .internal DNS bypasses the proxy and would hit a sleeping machine.
  DIRECTUS_URL = "https://gevoelscore-backend.fly.dev"
  NEXT_PUBLIC_APP_URL = "https://gevoelscore-frontend.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  # 'suspend' snapshots memory when idle; the Fly proxy resumes the
  # machine in ~1s on the next request. Accepted tradeoff: first request
  # after idle carries the resume latency.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[deploy]
  strategy = "rolling"
  max_unavailable = 1

# No [metrics] section — telemetry is forbidden per the cardinal principles.
